<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버려진 낙원의 묵시록</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
    /* --- 세력별 포인트 컬러 테마 --- */
    :root {
        --angel-color: #f1c40f;    
        --demon-color: #ff3333;    
        --human-color: #2ecc71;    
        --fallen-color: #ffffff;   

        --currentAccent: var(--angel-color);
        --currentGlow: rgba(241, 196, 15, 0.4); 
    }

    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: #000; color: #ffffff;
        font-family: 'Nanum Myeongjo', serif; overflow: hidden; 
        text-rendering: optimizeLegibility; 
        -webkit-font-smoothing: antialiased;
    }

    /* --- 인트로 및 시작 화면 --- */
    #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 6s ease; }
    #loading-text { font-size: 0.8rem; letter-spacing: 0.5rem; color: #444; animation: pulse 1.5s infinite; }
    
    /* [수정됨] 버튼 그룹 레이아웃 */
    #start-btn-group { display: none; flex-direction: column; gap: 20px; align-items: center; }
    .start-btn { 
        padding: 15px 40px; font-size: 1rem; letter-spacing: 0.3rem; 
        background: transparent; color: #888; border: 1px solid #444; 
        cursor: pointer; transition: all 0.3s ease; 
        font-family: 'Nanum Myeongjo', serif; width: 280px; text-align: center;
    }
    .start-btn:hover { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 20px #fff; }
    @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

    /* --- 메인 컨테이너 --- */
    .pv-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    #bgm-control { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 100000; background: rgba(15, 15, 15, 0.85); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 8px; padding: 10px 20px; color: rgba(255, 255, 255, 0.9); font-family: sans-serif; font-size: 0.75rem; letter-spacing: 0.15rem; cursor: pointer; opacity: 0; transition: opacity 2s ease, all 0.3s ease; }
    .is-playing #bgm-control, .is-skipped #bgm-control { opacity: 1; }

    /* --- 배경 및 빗방울 연출 --- */
    .pv-bg-city { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/khslone1/npc1/refs/heads/main/bob%20city.png'); background-size: cover; background-position: center; filter: brightness(20%) contrast(120%); z-index: 1; }
    .pv-bg-heaven { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/khslone1/npc1/refs/heads/main/bob%20heaven.png'); background-size: cover; background-position: center; filter: brightness(70%) contrast(110%); z-index: 2; }
    .is-playing .pv-bg-heaven { animation: fadeOutBackground 4s ease forwards; animation-delay: 32s; }
    @keyframes fadeOutBackground { 0% { opacity: 1; filter: brightness(70%); } 30% { filter: brightness(150%); } 100% { opacity: 0; filter: brightness(0%); } }

    .rain { position: absolute; top: -100px; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 3; opacity: 0; }
    .is-playing .rain { animation: fadeInRain 3s ease forwards; animation-delay: 32.5s; }
    @keyframes fadeInRain { to { opacity: 1; } }
    .rain-drop { position: absolute; bottom: 100%; width: 1.5px; height: 35px; background-color: rgba(255, 255, 255, 0.25); animation: fall 1.2s linear infinite; }
    @keyframes fall { 0% { transform: translateY(0); } 100% { transform: translateY(120vh); } }

    /* --- 텍스트 시퀀스 --- */
    .center-box { position: relative; width: 100%; height: 40vh; background-color: #000; box-shadow: 0 0 100px 80px #000; display: flex; justify-content: center; align-items: center; z-index: 4; }
    .text-layer { position: absolute; font-weight: 400; opacity: 0; text-align: center; letter-spacing: 0.3rem; white-space: nowrap; font-size: clamp(1rem, 2vw, 1.8rem); }
    .holy-text { color: #fffde7; text-shadow: 0 0 15px rgba(255, 255, 200, 0.5); }
    .noir-text { color: #ffffff; text-shadow: 0 0 10px #000; }

    @keyframes fadeSmoke { 0% { opacity: 0; filter: blur(10px); transform: scale(1.03); } 15% { opacity: 1; filter: blur(0px); transform: scale(1); } 85% { opacity: 1; filter: blur(0px); transform: scale(1); } 100% { opacity: 0; filter: blur(10px); transform: scale(0.97); } }
    @keyframes bloodFlash { 0% { opacity: 0; transform: scale(1.1); filter: blur(8px); } 15% { opacity: 1; transform: scale(1); filter: blur(0px); text-shadow: 0 0 20px #f00; } 70% { opacity: 1; transform: scale(1); filter: blur(0px); text-shadow: 0 0 20px #f00; } 100% { opacity: 0; transform: scale(1.05); filter: blur(20px); } }

    .is-playing .seq-p1-1 { animation: fadeSmoke 4.5s ease forwards; animation-delay: 4s; }   
    .is-playing .seq-p1-2 { animation: fadeSmoke 4.5s ease forwards; animation-delay: 8.5s; } 
    .is-playing .seq-p1-3 { animation: fadeSmoke 4.5s ease forwards; animation-delay: 13s; }  
    .is-playing .seq-p2-1 { animation: fadeSmoke 4.5s ease forwards; animation-delay: 17.5s; } 
    .is-playing .seq-p2-2 { animation: fadeSmoke 4.5s ease forwards; animation-delay: 22s; }   
    .is-playing .seq-p2-3 { animation: bloodFlash 4.5s ease forwards; animation-delay: 26.5s; color: #ff3333; font-weight: 700; } 
    
    .is-playing .seq-final { animation: titleRevealAndMove 10.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; animation-delay: 31.8s; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; }
    @keyframes titleRevealAndMove { 0% { opacity: 1; transform: translateY(0); letter-spacing: 0.5rem; } 41.2% { opacity: 1; transform: translateY(0); letter-spacing: 0.5rem; } 75% { opacity: 1; transform: translateY(-38vh) scale(0.6); letter-spacing: 0.8rem; } 100% { opacity: 1; transform: translateY(-38vh) scale(0.6); letter-spacing: 0.8rem; } }

    .seq-final span { opacity: 0; display: inline-block; color: #ffffff; }
    .is-playing .seq-final span { animation: typeFlashIn 0.6s ease-out forwards; }
    @keyframes typeFlashIn {
        0% { opacity: 0; transform: scale(1.3); filter: blur(10px); }
        40% { opacity: 1; transform: scale(1); filter: blur(0); text-shadow: 0 0 40px #fff, 0 0 80px var(--currentGlow); }
        100% { opacity: 1; transform: scale(1); text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 30px var(--currentAccent); }
    }
    .is-playing .seq-final span:nth-child(n) { animation-delay: calc(31.8s + (0.2s * var(--i))); }

    /* --- [신규 추가] 스킵(Skip) 모드 전용 CSS 클래스 --- */
    .is-skipped .pv-bg-heaven { opacity: 0; animation: none; } /* 천국 배경 즉시 제거 */
    .is-skipped .rain { opacity: 1; animation: none; } /* 비 즉시 표시 */
    
    /* 기존 대사들 모두 숨김 */
    .is-skipped .seq-p1-1, .is-skipped .seq-p1-2, .is-skipped .seq-p1-3,
    .is-skipped .seq-p2-1, .is-skipped .seq-p2-2, .is-skipped .seq-p2-3 { display: none !important; animation: none !important; }
    
    /* 최종 타이틀을 즉시 상단에 위치시킴 */
    .is-skipped .seq-final {
        opacity: 1; animation: none; 
        transform: translateY(-38vh) scale(0.6); letter-spacing: 0.8rem; 
        font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800;
    }
    .is-skipped .seq-final span {
        opacity: 1; animation: none;
        text-shadow: 0 0 15px rgba(255,255,255,0.8), 0 0 30px var(--currentAccent);
    }
    
    /* 캐릭터 보드 즉시 표시 */
    .is-skipped .character-board { bottom: 0; opacity: 1; animation: none; }

    /* --- 캐릭터 소개란 보드 디자인 --- */
    .character-board {
        position: absolute; bottom: -110%; left: 50%; transform: translateX(-50%);
        width: 95%; max-width: 950px; height: 80vh;
        background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1); border-bottom: none; border-radius: 20px 20px 0 0;
        z-index: 5; display: flex; flex-direction: column; overflow: hidden;
    }
    .is-playing .character-board { animation: slideUpBoard 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; animation-delay: 36s; }
    @keyframes slideUpBoard { 0% { bottom: -110%; opacity: 0;} 100% { bottom: 0; opacity: 1;} }

    .tab-nav { display: flex; justify-content: space-around; background: rgba(0,0,0,0.6); border-bottom: 1px solid #222; }
    .tab-btn {
        padding: 25px; font-size: 1.1rem; letter-spacing: 0.3rem; color: #666; cursor: pointer; transition: 0.3s;
        flex: 1; text-align: center; border-bottom: 3px solid transparent; font-weight: 700;
    }
    .tab-btn.active { color: var(--currentAccent); border-bottom: 3px solid var(--currentAccent); background: rgba(255,255,255,0.03); }

    .char-list { flex: 1; overflow-y: auto; padding: 50px; scrollbar-width: none; }
    .char-list::-webkit-scrollbar { display: none; }

    .char-item {
        display: flex; gap: 50px; margin-bottom: 100px; align-items: flex-start;
        opacity: 0; transform: translateY(30px); transition: 0.6s ease;
        border-bottom: 1px solid #1a1a1a; padding-bottom: 50px;
    }
    .char-item.show { opacity: 1; transform: translateY(0); }
    .is-skipped .char-item { transition: 0.3s ease; } /* 스킵 시 더 빠르게 표시 */

    .char-img-box {
        flex: 0 0 280px; aspect-ratio: 3/4; background: #000; border: 2px solid #333; 
        overflow: hidden; border-radius: 4px; cursor: pointer; transition: 0.4s;
    }
    .char-img-box img { width: 100%; height: 100%; object-fit: cover; }
    .char-img-box:hover { border-color: var(--currentAccent); box-shadow: 0 0 30px var(--currentGlow); transform: scale(1.03); }

    .char-info-box { flex: 1; text-align: left; padding-top: 15px; }
    .char-header { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px; color: var(--currentAccent); }
    .char-name { font-size: 3rem; font-weight: 800; color: #fff; margin: 0; font-family: 'Nanum Myeongjo', serif; letter-spacing: 0.3rem; }
    
    .char-stats { display: flex; gap: 15px; margin-bottom: 30px; font-size: 0.95rem; color: #aaa; font-family: sans-serif; font-weight: bold;}
    .stat-tag { background: #1a1a1a; padding: 6px 14px; border-radius: 3px; border: 1px solid #333; }
    
    .char-desc { font-size: 1.55rem; line-height: 1.9; color: #ccc; word-break: keep-all; font-family: 'Nanum Myeongjo', serif; padding-bottom: 10px; }

    /* --- 갤러리 팝업 --- */
    .gallery-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px);
        z-index: 2000000; display: flex; justify-content: center; align-items: center;
        opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    .gallery-modal.show { opacity: 1; pointer-events: auto; }

    .gallery-box {
        width: 90%; max-width: 1100px; max-height: 90vh;
        background: #0a0a0a; border: 1px solid #333; border-top: 3px solid var(--currentAccent); border-radius: 8px;
        display: flex; flex-direction: row; position: relative;
        box-shadow: 0 15px 50px rgba(0,0,0,0.9);
        transform: scale(0.95); transition: transform 0.4s ease;
        overflow: hidden;
    }
    .gallery-modal.show .gallery-box { transform: scale(1); }

    .gallery-left {
        flex: 1.2; padding: 20px; border-right: 1px solid #222;
        display: flex; justify-content: center; align-items: center;
    }
    .gallery-left-img-wrapper {
        width: 100%; height: 100%; background: #000; border: 1px solid #333;
        border-radius: 4px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .gallery-left-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

    .gallery-right { flex: 1; padding: 40px; display: flex; flex-direction: column; }
    .gallery-header { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #222; text-align: left; }
    .gallery-title { font-size: 1.1rem; color: #fff; letter-spacing: 0.2rem; font-weight: 700;}

    .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; flex: 1; overflow-y: auto; scrollbar-width: none; }
    .thumb-grid::-webkit-scrollbar { display: none; }
    
    .thumb-item { aspect-ratio: 1/1; background: #111; border: 1px solid #333; border-radius: 4px; overflow: hidden; cursor: pointer; transition: 0.3s; }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.3s; }
    
    .thumb-item:hover { border-color: var(--currentAccent); transform: translateY(-3px); box-shadow: 0 5px 15px var(--currentGlow); }
    .thumb-item:hover img { filter: grayscale(0%); }

    .close-gallery { position: absolute; top: 15px; right: 20px; color: #666; font-size: 1.8rem; cursor: pointer; z-index: 10; transition: 0.3s; line-height: 1; }
    .close-gallery:hover { color: var(--currentAccent); }

    @media (max-width: 850px) { 
        .gallery-box { flex-direction: column; max-height: 90vh; overflow-y: auto; }
        .gallery-left { flex: auto; border-right: none; border-bottom: 1px solid #222; padding: 20px; }
        .gallery-left-img-wrapper { width: 100%; aspect-ratio: 3/4; margin: 0 auto; height: auto;}
        .gallery-right { padding: 30px; }
    }

    #sc-player { display: none; }
</style>
</head>
<body data-theme="angel"> 

    <iframe id="sc-player" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
        src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/2088115155&color=%23ff5500&auto_play=false&hide_related=false&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
    </iframe>

    <div id="start-screen">
        <div id="loading-text">LOADING...</div>
        <div id="start-btn-group">
            <button id="trigger-btn" class="start-btn">▶ 인트로 보기</button>
            <button id="skip-btn" class="start-btn">▶ 스킵</button>
        </div>
    </div>

    <div class="gallery-modal" id="galleryModal">
        <div class="gallery-box">
            <div class="close-gallery" id="closeGallery">×</div>
            <div class="gallery-left">
                <div class="gallery-left-img-wrapper">
                    <img id="galleryLargeImg" src="" alt="갤러리 원본">
                </div>
            </div>
            <div class="gallery-right">
                <div class="gallery-header">
                    <div class="gallery-title">GALLERY</div>
                </div>
                <div class="thumb-grid" id="thumbGrid">
                    </div>
            </div>
        </div>
    </div>

    <div id="main-content" class="pv-container">
        <button id="bgm-control">♪ BGM ON/OFF</button>

        <div class="pv-bg-city"></div>
        <div class="pv-bg-heaven"></div>
        <div class="rain" id="rain-box"></div>

        <div class="center-box">
            <div class="text-layer seq-p1-1 holy-text">태초에 빚어진 천사와 악마, 선악의 천칭은 완벽한 균형으로 세상을 통치했다.</div>
            <div class="text-layer seq-p1-2 holy-text">그러나 어느 날, 신은 낙원을 저버리고 그들에게 자신을 따를 것을 명했으니.</div>
            <div class="text-layer seq-p1-3 holy-text">대부분이 빛을 따랐으나, 기꺼이 지상에 남겨진 자들 또한 존재했다.</div>
            <div class="text-layer seq-p2-1 noir-text">억겁의 시간 속, 숭고한 사명은 모두 잊힌 채 인간 사회에 섞여든 천사와 악마들.</div>
            <div class="text-layer seq-p2-2 noir-text">신이 유기한 회색의 도시, 기적은 뒷골목의 네온사인 아래로 추락했다.</div>
            <div class="text-layer seq-p2-3">무지한 자들 위로, 다시 '강림'이 시작된다.</div>
            <div class="text-layer seq-final">
                <span style="--i:0">버</span><span style="--i:1">려</span><span style="--i:2">진</span><span style="--i:3">&nbsp;</span><span style="--i:4">낙</span><span style="--i:5">원</span><span style="--i:6">의</span><span style="--i:7">&nbsp;</span><span style="--i:8">묵</span><span style="--i:9">시</span><span style="--i:10">록</span>
            </div>
        </div>

        <div class="character-board">
            <div class="tab-nav">
                <div class="tab-btn active" data-cat="angel" onclick="showCategory('angel')">천사</div>
                <div class="tab-btn" data-cat="demon" onclick="showCategory('demon')">악마</div>
                <div class="tab-btn" data-cat="human" onclick="showCategory('human')">인간</div>
                <div class="tab-btn" data-cat="fallen" onclick="showCategory('fallen')">타천사</div>
            </div>
            <div class="char-list" id="charList">
                </div>
        </div>
    </div>

    <script>
        const widget = SC.Widget('sc-player');
        let isMuted = false;
        widget.bind(SC.Widget.Events.READY, () => widget.setVolume(30));

        const characterData = {
            angel: [
                { name: "가브리엘", mbti: "ENFJ-A · 2w1", img: "https://drlum.net/bab/g101.png", 
                  desc: "가장 찬란했던 대천사, 한때 천상의 빛으로 모든 것을 비추던 존재였지만, 이제는 그 날개를 접은 채 네온이 번지는 도시의 어둠 속으로 스며들어, 낡은 간판 아래 조용히 탐정 사무소를 운영하며 살아가고 있다.",
                  gallery: ["https://drlum.net/bab/g101.png", "https://drlum.net/bab/g106.png", "https://drlum.net/bab/g203.png", "https://drlum.net/bab/g214.png", "https://drlum.net/bab/g402.png", "https://drlum.net/bab/g303.png"] },
                { name: "이스라필", mbti: "INTJ-A · 1w9", img: "https://drlum.net/bab/i101.png", 
                  desc: "적들을 불사지르던 용맹한 천사, 과거 전장을 붉게 물들이며 모든 것을 태워버리던 존재였지만, 지금은 사라지지 않은 잔열처럼 식지 못한 채, 네온과 그림자가 뒤엉킨 도시의 밤을 떠돈다.",
                  gallery: ["https://drlum.net/bab/i101.png", "https://drlum.net/bab/i205.png", "https://drlum.net/bab/i301.png", "https://drlum.net/bab/i403.png", "https://drlum.net/bab/i213.png", "https://drlum.net/bab/i303.png"] },
                { name: "세라프", mbti: "ESFP-A · 7w6", img: "https://drlum.net/bab/c101.png", 
                  desc: "신의 곁을 지키던 천사, 가장 가까운 자리에서 신의 숨결을 지켜보던 존재였지만, 지금은 그 자리를 떠나 네온빛이 스며든 도시의 골목과 거리 사이를 오가며, 만능 아르바이트 소녀로 살아가고 있다.",
                  gallery: ["https://drlum.net/bab/c101.png", "https://drlum.net/bab/c106.png", "https://drlum.net/bab/c217.png", "https://drlum.net/bab/c401.png", "https://drlum.net/bab/c216.png", "https://drlum.net/bab/c304.png"] },
                { name: "카마엘", mbti: "ISTP-A · 8w9", img: "https://drlum.net/bab/k101.png", 
                  desc: "천사와 인간의 혼혈은 빛과 속세의 흔적을 함께 지닌 채 미묘하게 어긋난 존재로, 지금은 바벨 수도원의 긴 회랑과 적막한 뜰을 조용히 거닐며, 낮과 밤의 경계 어딘가에 어울리는 그림자처럼 그곳에 머물고 있다.",
                  gallery: ["https://drlum.net/bab/k101.png", "https://drlum.net/bab/k102.png", "https://drlum.net/bab/k106.png", "https://drlum.net/bab/k110.png", "https://drlum.net/bab/k302.png", "https://drlum.net/bab/k305.png"] }
            ],

                  gallery: ["https://drlum.net/bab/a101.png", "https://drlum.net/bab/a105.png", "https://drlum.net/bab/a209.png", "https://drlum.net/bab/a213.png", "https://drlum.net/bab/a401.png", "https://drlum.net/bab/a303.png"] }
            ]
        };

        const list = document.getElementById('charList');
        const btns = document.querySelectorAll('.tab-btn');
        const galleryModal = document.getElementById('galleryModal');
        const galleryLargeImg = document.getElementById('galleryLargeImg');
        const thumbGrid = document.getElementById('thumbGrid');

        const categoryColors = {
            angel: { accent: 'var(--angel-color)', glow: 'rgba(241, 196, 15, 0.4)' },
            demon: { accent: 'var(--demon-color)', glow: 'rgba(255, 51, 51, 0.4)' },
            human: { accent: 'var(--human-color)', glow: 'rgba(46, 204, 113, 0.4)' },
            fallen: { accent: 'var(--fallen-color)', glow: 'rgba(255, 255, 255, 0.4)' }
        };

        function showCategory(cat) {
            btns.forEach(btn => {
                if(btn.getAttribute('data-cat') === cat) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            document.documentElement.style.setProperty('--currentAccent', categoryColors[cat].accent);
            document.documentElement.style.setProperty('--currentGlow', categoryColors[cat].glow);

            list.innerHTML = "";
            characterData[cat].forEach((char, idx) => {
                const item = document.createElement('div');
                item.className = 'char-item';

                item.innerHTML = `
                    <div class="char-img-box" onclick="openGallery('${cat}', ${idx})"><img src="${char.img}"></div>
                    <div class="char-info-box">
                        <div class="char-header">
                            <div class="char-name">${char.name}</div>
                        </div>
                        <div class="char-stats">
                            <span class="stat-tag">${char.mbti}</span>
                        </div>
                        <div class="char-desc">${char.desc}</div>
                    </div>
                `;
                list.appendChild(item);
                // 스킵 상태라면 애니메이션 없이 즉시 표시되도록 시간 단축
                const delay = document.getElementById('main-content').classList.contains('is-skipped') ? 0 : idx * 150;
                setTimeout(() => item.classList.add('show'), delay);
            });
            list.scrollTop = 0;
        }

        function openGallery(cat, idx) {
            const char = characterData[cat][idx];
            galleryLargeImg.src = char.img;

            thumbGrid.innerHTML = "";
            char.gallery.forEach((imgSrc) => {
                const thumb = document.createElement('div');
                thumb.className = 'thumb-item';
                thumb.onclick = () => changeGalleryImage(imgSrc); 
                thumb.innerHTML = `<img src="${imgSrc}" alt="thumbnail">`;
                thumbGrid.appendChild(thumb);
            });

            galleryModal.classList.add('show');
        }

        function changeGalleryImage(imgSrc) {
            galleryLargeImg.src = imgSrc;
        }

        document.getElementById('closeGallery').addEventListener('click', () => galleryModal.classList.remove('show'));
        galleryModal.addEventListener('click', (e) => { 
            if(e.target === galleryModal) galleryModal.classList.remove('show'); 
        });

        showCategory('angel');

        // 1. 초기 로딩 후 두 버튼 표시
        setTimeout(() => {
            document.getElementById('loading-text').style.display = 'none';
            document.getElementById('start-btn-group').style.display = 'flex';
        }, 3000);

        const rainBox = document.getElementById('rain-box');
        for (let i = 0; i < 160; i++) {
            const drop = document.createElement('div');
            drop.classList.add('rain-drop');
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDelay = Math.random() * 1.5 + 's';
            drop.style.animationDuration = (Math.random() * 0.4 + 0.7) + 's'; 
            rainBox.appendChild(drop);
        }

        // [이벤트] 2. 인트로 시청 클릭 시
        document.getElementById('trigger-btn').addEventListener('click', function() {
            widget.play();
            document.getElementById('main-content').classList.add('is-playing');
            document.getElementById('start-btn-group').style.display = 'none';
            
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('start-screen').style.display = 'none', 6000);
        });

        // [이벤트] 3. 스킵 (캐릭터 소개 즉시 진입) 클릭 시
        document.getElementById('skip-btn').addEventListener('click', function() {
            widget.play();
            // is-skipped 클래스 추가하여 CSS 애니메이션 통과
            document.getElementById('main-content').classList.add('is-skipped');
            document.getElementById('start-btn-group').style.display = 'none';
            
            // 빠른 전환을 위해 페이드아웃 속도 조절
            const startScreen = document.getElementById('start-screen');
            startScreen.style.transition = 'opacity 1.5s ease';
            startScreen.style.opacity = '0';
            
            setTimeout(() => startScreen.style.display = 'none', 1500);
            
            // 현재 활성화된 탭의 리스트들도 즉시 보이도록 강제 갱신
            document.querySelectorAll('.char-item').forEach(item => item.classList.add('show'));
        });

        document.getElementById('bgm-control').addEventListener('click', function() {
            if (isMuted) {
                widget.play();
                this.style.color = 'rgba(255, 255, 255, 0.9)';
            } else {
                widget.pause();
                this.style.color = 'rgba(255, 255, 255, 0.4)';
            }
            isMuted = !isMuted;
        });
    </script>
